name: answer-generator-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: ${TASK_IMAGE:-answer-generator-prod-task}
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      target: task
    env_file:
      - ${ANSWER_GENERATOR_ENV_FILE:-.env.production}
    command: ["pnpm", "--filter", "@answer-generator/db", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${API_IMAGE:-answer-generator-prod-api}
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ${ANSWER_GENERATOR_ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:-answer-generator-prod-web}
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ${ANSWER_GENERATOR_ENV_FILE:-.env.production}
    ports:
      - "${WEB_BIND_HOST:-0.0.0.0}:${WEB_PORT:-3011}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  worker:
    image: ${WORKER_IMAGE:-answer-generator-prod-worker}
    build:
      context: .
      dockerfile: apps/worker/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ${ANSWER_GENERATOR_ENV_FILE:-.env.production}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  pgdata:
  redisdata:
